# ============================================================
# Window Rules & Workspace Assignments
# ============================================================

# ── Floating Terminal ──────────────────────────────────────
windowrule {
    name = floating-terminal
    float = true
    match:class = ^(floating-term)$
    size = 900 500
}

# ── Workspace Assignments ──────────────────────────────────
windowrule {
    name = librewolf-workspace
    workspace = 1
    match:class = ^(librewolf)$
}

windowrule {
    name = nvim-workspace
    workspace = 3
    match:class = ^(kitty-nvim)$
}

windowrule {
    name = thunar-workspace
    workspace = 4
    match:class = ^(thunar)$
    opacity = 0.80
}

windowrule {
    name = yazi-workspace
    workspace = 4
    match:class = ^(kitty-yazi)$
}

windowrule {
    name = fooyin-workspace
    opacity = 0.75
    workspace = special:music
    match:class = ^(org.fooyin.fooyin)$
}

windowrule {
    name = sqlitebrowser
    opacity = 0.75 0.75
    match:class = sqlitebrowser
}

# ── Opacity Rules ──────────────────────────────────────────
windowrule {
    name = librewolf-opacity
    opacity = 1 1
    match:class = ^(librewolf)$
}

windowrule {
    name = youtube-opaque
    opaque = true
    match:title = .*YouTube.*
}

# ── Global Fixes ───────────────────────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = true
}

windowrule {
    name = librewolf-floating-filepicker
    match:class = ^(xdg-desktop-portal-gtk)$
    float = true
    size = 900 500
}
