# ============================================================
# Environment Variables
# ============================================================

# NVIDIA + Wayland
env = LIBVA_DRIVER_NAME,nvidia

# Wayland toolkit hints
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb

# Cursor sizing
env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18
